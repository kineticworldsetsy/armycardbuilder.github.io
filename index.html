<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Army Unit Card Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color:#ECECEC;">
    
    <div id="carcosa-card-builder">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@700&display=swap');

    @font-face {
      font-family: 'Frakturika';
      src: url('./FRAKTURI.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    #carcosa-card-builder {
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      max-width: 1240px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    #carcosa-card-builder *,
    #carcosa-card-builder *::before,
    #carcosa-card-builder *::after {
      box-sizing: border-box;
    }

    #carcosa-card-builder .builder-wrap {
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 24px;
      align-items: start;
    }

    #carcosa-card-builder .panel {
      background: #f7f7f4;
      border: 1px solid #d9d9d1;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }

    #carcosa-card-builder h2,
    #carcosa-card-builder h3 {
      margin: 0 0 14px 0;
      line-height: 1.2;
    }

    #carcosa-card-builder .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #carcosa-card-builder .full {
      grid-column: 1 / -1;
    }

    #carcosa-card-builder label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 5px;
      color: #333;
    }

    #carcosa-card-builder input[type="text"],
    #carcosa-card-builder input[type="number"],
    #carcosa-card-builder select,
    #carcosa-card-builder textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bfc3bc;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    #carcosa-card-builder textarea {
      resize: vertical;
      min-height: 58px;
      line-height: 1.35;
    }

    #carcosa-card-builder .keywords-box {
      border: 1px solid #d6d6cf;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }

    #carcosa-card-builder .keyword-block {
      border: 1px solid #e1e1d9;
      border-radius: 10px;
      padding: 10px;
      background: #fbfbf8;
      margin-bottom: 10px;
    }

    #carcosa-card-builder .keyword-block:last-child {
      margin-bottom: 0;
    }

    #carcosa-card-builder .keyword-top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    #carcosa-card-builder .kw-btn {
      border: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      font-weight: 700;
    }

    #carcosa-card-builder .kw-add {
      background: #dce97a;
      color: #1b1b1b;
    }

    #carcosa-card-builder .kw-remove {
      background: #2c2c2c;
      color: #fff;
    }

    #carcosa-card-builder .stat-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #carcosa-card-builder .stat-item {
      border: 1px solid #d8d8d1;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: start;
    }

    #carcosa-card-builder .stat-item.dragging {
      opacity: 0.45;
    }

    #carcosa-card-builder .drag-handle {
      width: 38px;
      height: 38px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f1f1ec;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
      font-size: 18px;
      line-height: 1;
      color: #444;
    }

    #carcosa-card-builder .drag-handle:active {
      cursor: grabbing;
    }

    #carcosa-card-builder .stat-item.drag-over {
      outline: 2px dashed #b8c84c;
      outline-offset: 2px;
    }

    #carcosa-card-builder .stat-fields {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
      align-items: end;
    }

    #carcosa-card-builder .stat-note {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }

    #carcosa-card-builder .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    #carcosa-card-builder .actions button {
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #carcosa-card-builder .btn-primary {
      background: #dce97a;
      color: #111;
    }

    #carcosa-card-builder .btn-dark {
      background: #222;
      color: #fff;
    }

    #carcosa-card-builder .btn-light {
      background: #ecece7;
      color: #222;
    }

    #carcosa-card-builder .preview-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #carcosa-card-builder .preview-note {
      font-size: 13px;
      color: #555;
    }

    #carcosa-card-builder .canvas-shell {
      background: #e9e9e3;
      border: 1px solid #d4d4cc;
      border-radius: 12px;
      padding: 16px;
      overflow: auto;
    }

    #carcosa-card-builder canvas {
      display: block;
      width: 100%;
      max-width: 840px;
      aspect-ratio: 7 / 5;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,.14);
    }

    @media (max-width: 980px) {
      #carcosa-card-builder .builder-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body * {
        visibility: hidden !important;
      }
      #carcosa-print-only,
      #carcosa-print-only * {
        visibility: visible !important;
      }
      #carcosa-print-only {
        position: absolute;
        left: 0;
        top: 0;
      }
    }
  </style>

  <div class="builder-wrap">
    <div class="panel">
      <h2>Unit Card Builder</h2>

      <div class="form-grid">
        <div class="full">
          <label for="unitName">Unit Name</label>
          <input id="unitName" type="text" value="The Mob of Carcosa" />
        </div>

        <div class="full">
          <label for="unitType">Unit Type</label>
          <select id="unitType">
            <option>Light Infantry</option>
            <option>Ranged Infantry</option>
            <option>Heavy Infantry</option>
            <option>Monstrous Infantry</option>
            <option>Light Cavalry</option>
            <option>Heavy Cavalry</option>
            <option>Chariot</option>
            <option>War Wagon</option>
            <option>Monster</option>
            <option>Beasts</option>
            <option>Artillery</option>
          </select>
        </div>

        <div class="full">
          <label>Reorder Stat Fields</label>
          <div class="stat-list" id="statList"></div>
        </div>

        <div class="full">
          <label>Keywords & Reminder Text</label>
          <div class="keywords-box" id="keywordsBox"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="downloadPngBtn">Download PNG</button>
        <button class="btn-dark" id="printBtn">Print Card</button>
        <button class="btn-light" id="resetBtn">Load Example</button>
      </div>
    </div>

    <div class="panel preview-wrap">
      <h3>Preview</h3>
      <div class="preview-note">
        Card size is rendered at 300 DPI for print: <strong>3.5" × 2.5"</strong> landscape.
      </div>
      <div class="canvas-shell">
        <canvas id="cardCanvas" width="1050" height="750"></canvas>
      </div>
    </div>
  </div>

  <div id="carcosa-print-only" style="display:none;"></div>

  <script>
    (function () {
      const canvas = document.getElementById("cardCanvas");
      const ctx = canvas.getContext("2d");

      const els = {
        unitName: document.getElementById("unitName"),
        unitType: document.getElementById("unitType"),
        statList: document.getElementById("statList"),
        keywordsBox: document.getElementById("keywordsBox"),
        downloadPngBtn: document.getElementById("downloadPngBtn"),
        printBtn: document.getElementById("printBtn"),
        resetBtn: document.getElementById("resetBtn")
      };

      const statDefinitions = [
        { key: "speed", label: "Speed", note: "Shown on card and affected by order" },
        { key: "range", label: "Range", note: "Shown on card and affected by order" },
        { key: "strikes", label: "Strikes", note: "Shown on card and affected by order" },
        { key: "courage", label: "Courage", note: "Shown on card and affected by order" },
        { key: "points", label: "Points", note: "Shown on card and affected by order" },
        { key: "altPoints", label: "(Points)", note: "Can be rearranged here, but always appears under Points in parentheses" }
      ];

      let draggedStatItem = null;

      function makeStatItem(def, value = "") {
        const item = document.createElement("div");
        item.className = "stat-item";
        item.dataset.key = def.key;
        item.draggable = true;

        const handle = document.createElement("div");
        handle.className = "drag-handle";
        handle.title = "Drag to reorder";
        handle.innerHTML = "☰";

        const content = document.createElement("div");

        const fields = document.createElement("div");
        fields.className = "stat-fields";

        const labelWrap = document.createElement("div");
        const label = document.createElement("label");
        label.textContent = def.label;
        label.style.marginBottom = "0";
        labelWrap.appendChild(label);

        const inputWrap = document.createElement("div");
        const input = document.createElement("input");
        input.type = "number";
        input.value = value;
        input.className = "stat-input";
        input.dataset.key = def.key;

        if (def.key === "range") {
          input.placeholder = "blank = none";
        }

        inputWrap.appendChild(input);

        fields.appendChild(labelWrap);
        fields.appendChild(inputWrap);

        const note = document.createElement("div");
        note.className = "stat-note";
        note.textContent = def.note;

        content.appendChild(fields);
        content.appendChild(note);

        item.appendChild(handle);
        item.appendChild(content);

        bindStatDragEvents(item);
        input.addEventListener("input", renderCard);
        input.addEventListener("change", renderCard);

        return item;
      }

      function bindStatDragEvents(item) {
        item.addEventListener("dragstart", () => {
          draggedStatItem = item;
          item.classList.add("dragging");
        });

        item.addEventListener("dragend", () => {
          item.classList.remove("dragging");
          draggedStatItem = null;
          Array.from(els.statList.children).forEach(child => child.classList.remove("drag-over"));
          renderCard();
        });

        item.addEventListener("dragover", (e) => {
          e.preventDefault();
        });

        item.addEventListener("dragenter", (e) => {
          e.preventDefault();
          if (item !== draggedStatItem) item.classList.add("drag-over");
        });

        item.addEventListener("dragleave", () => {
          item.classList.remove("drag-over");
        });

        item.addEventListener("drop", (e) => {
          e.preventDefault();
          item.classList.remove("drag-over");
          if (!draggedStatItem || draggedStatItem === item) return;

          const items = Array.from(els.statList.children);
          const draggedIndex = items.indexOf(draggedStatItem);
          const targetIndex = items.indexOf(item);

          if (draggedIndex < targetIndex) {
            els.statList.insertBefore(draggedStatItem, item.nextSibling);
          } else {
            els.statList.insertBefore(draggedStatItem, item);
          }
        });
      }

      function makeKeywordBlock(keywordValue = "", reminderValue = "") {
        const block = document.createElement("div");
        block.className = "keyword-block";

        const top = document.createElement("div");
        top.className = "keyword-top";

        const keywordInput = document.createElement("input");
        keywordInput.type = "text";
        keywordInput.placeholder = "Keyword";
        keywordInput.value = keywordValue;
        keywordInput.className = "keyword-input";

        const addBtn = document.createElement("button");
        addBtn.type = "button";
        addBtn.className = "kw-btn kw-add";
        addBtn.textContent = "+";

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "kw-btn kw-remove";
        removeBtn.textContent = "−";

        const reminder = document.createElement("textarea");
        reminder.placeholder = "Reminder text";
        reminder.value = reminderValue;
        reminder.className = "keyword-reminder";

        addBtn.addEventListener("click", () => {
          const newBlock = makeKeywordBlock("", "");
          block.after(newBlock);
          bindKeywordEvents(newBlock);
          renderCard();
        });

        removeBtn.addEventListener("click", () => {
          const blocks = els.keywordsBox.querySelectorAll(".keyword-block");
          if (blocks.length > 1) {
            block.remove();
            renderCard();
          } else {
            keywordInput.value = "";
            reminder.value = "";
            renderCard();
          }
        });

        top.appendChild(keywordInput);
        top.appendChild(addBtn);
        top.appendChild(removeBtn);

        block.appendChild(top);
        block.appendChild(reminder);

        return block;
      }

      function bindKeywordEvents(block) {
        const keywordInput = block.querySelector(".keyword-input");
        const reminder = block.querySelector(".keyword-reminder");

        keywordInput.addEventListener("input", renderCard);
        reminder.addEventListener("input", renderCard);
      }

      function getKeywordData() {
        return Array.from(els.keywordsBox.querySelectorAll(".keyword-block"))
          .map(block => {
            return {
              keyword: block.querySelector(".keyword-input").value.trim(),
              reminder: block.querySelector(".keyword-reminder").value.trim()
            };
          })
          .filter(item => item.keyword || item.reminder);
      }

      function getStatDataInUiOrder() {
        return Array.from(els.statList.querySelectorAll(".stat-item")).map(item => {
          const key = item.dataset.key;
          const input = item.querySelector(".stat-input");
          return {
            key,
            label: statDefinitions.find(d => d.key === key).label,
            value: (input.value || "").trim()
          };
        });
      }

      function fitText(ctx, text, maxWidth, startSize, minSize, fontFamily, fontWeight = "700", fontStyle = "normal") {
        let size = startSize;
        while (size > minSize) {
          ctx.font = `${fontStyle} ${fontWeight} ${size}px ${fontFamily}`;
          if (ctx.measureText(text).width <= maxWidth) return size;
          size -= 1;
        }
        return minSize;
      }

      function wrapText(ctx, text, maxWidth) {
        const paragraphs = String(text).split("\n");
        const allLines = [];

        paragraphs.forEach(paragraph => {
          const words = paragraph.split(/\s+/).filter(Boolean);

          if (!words.length) {
            allLines.push("");
            return;
          }

          let line = "";
          for (let i = 0; i < words.length; i++) {
            const testLine = line ? line + " " + words[i] : words[i];
            const testWidth = ctx.measureText(testLine).width;

            if (testWidth > maxWidth && line) {
              allLines.push(line);
              line = words[i];
            } else {
              line = testLine;
            }
          }

          if (line) allLines.push(line);
        });

        return allLines;
      }

      function drawGrungeBorder(ctx, x, y, w, h) {
        ctx.save();

        ctx.strokeStyle = "#1c1c1c";
        ctx.fillStyle = "#1c1c1c";
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.lineWidth = 8;
        roughRect(ctx, x + 16, y + 16, w - 32, h - 32, 7, 6);

        ctx.globalAlpha = 0.6;
        ctx.lineWidth = 3;
        roughRect(ctx, x + 24, y + 24, w - 48, h - 48, 10, 4);

        ctx.globalAlpha = 0.95;
        const blotches = [
          [x + 18, y + 20, 34, 16],
          [x + 80, y + 18, 30, 12],
          [x + w - 75, y + 22, 28, 14],
          [x + w - 38, y + 26, 18, 9],
          [x + 22, y + h - 42, 42, 16],
          [x + 66, y + h - 28, 22, 10],
          [x + w - 100, y + h - 35, 46, 18],
          [x + w - 44, y + h - 24, 20, 10],
          [x + 14, y + 120, 12, 36],
          [x + 20, y + 250, 10, 34],
          [x + w - 26, y + 140, 10, 42],
          [x + w - 28, y + 310, 11, 28]
        ];

        blotches.forEach(([bx, by, bw, bh]) => drawBlob(ctx, bx, by, bw, bh));
        ctx.restore();
      }

      function roughRect(ctx, x, y, w, h, jitter, step) {
        ctx.beginPath();
        roughLine(ctx, x, y, x + w, y, jitter, step);
        roughLine(ctx, x + w, y, x + w, y + h, jitter, step);
        roughLine(ctx, x + w, y + h, x, y + h, jitter, step);
        roughLine(ctx, x, y + h, x, y, jitter, step);
        ctx.stroke();
      }

      function roughLine(ctx, x1, y1, x2, y2, jitter, step) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const segments = Math.max(2, Math.floor(dist / step));

        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const x = x1 + dx * t + (Math.random() - 0.5) * jitter;
          const y = y1 + dy * t + (Math.random() - 0.5) * jitter;

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
      }

      function drawBlob(ctx, x, y, w, h) {
        ctx.beginPath();
        const pts = 10;
        for (let i = 0; i < pts; i++) {
          const px = x + (i / (pts - 1)) * w;
          const py = y + (Math.random() * h);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        for (let i = pts - 1; i >= 0; i--) {
          const px = x + (i / (pts - 1)) * w;
          const py = y + h + (Math.random() * h * 0.25);
          ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
      }

      function renderCard() {
        const statData = getStatDataInUiOrder();
        const mainStatOrder = statData.filter(s => s.key !== "altPoints");
        const altPointsEntry = statData.find(s => s.key === "altPoints");

        const data = {
          unitName: (els.unitName.value || "").trim() || "Untitled Unit",
          unitType: (els.unitType.value || "").trim(),
          stats: mainStatOrder,
          altPoints: altPointsEntry ? altPointsEntry.value : "",
          keywords: getKeywordData()
        };

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fcfcf9";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 900; i++) {
          const alpha = Math.random() * 0.03;
          ctx.fillStyle = `rgba(0,0,0,${alpha})`;
          const px = Math.random() * canvas.width;
          const py = Math.random() * canvas.height;
          const s = Math.random() * 2 + 0.5;
          ctx.fillRect(px, py, s, s);
        }

        drawGrungeBorder(ctx, 0, 0, canvas.width, canvas.height);

        const innerX = 55;
        const innerY = 42;
        const innerW = canvas.width - 110;
        const innerH = canvas.height - 84;

        const titleMaxWidth = innerW - 30;
        let titleStart = 76;
        if (data.unitName.length > 18) titleStart = 68;
        if (data.unitName.length > 26) titleStart = 60;
        if (data.unitName.length > 34) titleStart = 52;
        if (data.unitName.length > 42) titleStart = 46;

        const titleSize = fitText(
          ctx,
          data.unitName,
          titleMaxWidth,
          titleStart,
          28,
          '"Frakturika", "Palatino Linotype", "Book Antiqua", Georgia, serif',
          "normal",
          "normal"
        );

        ctx.fillStyle = "#232323";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.font = `normal ${titleSize}px "Frakturika", "Palatino Linotype", "Book Antiqua", Georgia, serif`;
        ctx.fillText(data.unitName, canvas.width / 2, innerY + 4);

        ctx.font = `normal 700 34px "EB Garamond", Garamond, Georgia, serif`;
        ctx.fillStyle = "#4a4a4a";
        ctx.fillText(data.unitType.toUpperCase(), canvas.width / 2, innerY + 96);

        const statsTop = innerY + 154;
        const labelY = statsTop;
        const valueY = statsTop + 40;
        const altValueY = valueY + 82;

        const colXs = [
          innerX + 70,
          innerX + 250,
          innerX + 450,
          innerX + 655,
          innerX + 835
        ];

        ctx.textAlign = "center";
        ctx.textBaseline = "top";

        data.stats.forEach((stat, i) => {
          const x = colXs[i];
          const labelText = stat.label.toUpperCase();

          ctx.fillStyle = "#2f2f2f";
          ctx.font = `normal 700 30px "EB Garamond", Garamond, Georgia, serif`;
          ctx.fillText(labelText, x, labelY);

          let displayValue = stat.value;
          if (stat.key === "range" && displayValue === "") displayValue = "—";
          if (displayValue === "") displayValue = "—";

          const valueSize = fitText(
            ctx,
            String(displayValue),
            150,
            stat.key === "points" ? 78 : 84,
            44,
            '"EB Garamond", Garamond, Georgia, serif',
            "700",
            "normal"
          );

          ctx.fillStyle = "#111";
          ctx.font = `normal 700 ${valueSize}px "EB Garamond", Garamond, Georgia, serif`;
          ctx.fillText(String(displayValue).toUpperCase(), x, valueY);

          if (stat.key === "points" && data.altPoints) {
            const altText = `(${String(data.altPoints).toUpperCase()})`;
            const altSize = fitText(
              ctx,
              altText,
              145,
              50,
              26,
              '"EB Garamond", Garamond, Georgia, serif',
              "700",
              "normal"
            );
            ctx.fillStyle = "#444";
            ctx.font = `normal 700 ${altSize}px "EB Garamond", Garamond, Georgia, serif`;
            ctx.fillText(altText, x, altValueY);
          }
        });

        /* FIXED KEYWORD POSITIONING */
        const kwTop = innerY + 330;
        const kwLeft = innerX + 42;
        const kwWidth = innerW - 84;

        let keywordFontSize = 36;
        let reminderFontSize = 22;

        const totalKeywordChars = data.keywords.reduce((sum, item) => {
          return sum + item.keyword.length + item.reminder.length;
        }, 0);

        if (data.keywords.length >= 3) {
          keywordFontSize = 31;
          reminderFontSize = 19;
        }
        if (data.keywords.length >= 5 || totalKeywordChars > 110) {
          keywordFontSize = 27;
          reminderFontSize = 17;
        }
        if (data.keywords.length >= 7 || totalKeywordChars > 180) {
          keywordFontSize = 23;
          reminderFontSize = 15;
        }

        function buildKeywordLayout() {
          const blocks = [];
          let totalHeight = 0;

          data.keywords.forEach(item => {
            const block = {
              keywordLines: [],
              reminderLines: []
            };

            if (item.keyword) {
              ctx.font = `normal 700 ${keywordFontSize}px "EB Garamond", Garamond, Georgia, serif`;
              block.keywordLines = wrapText(ctx, item.keyword.toUpperCase(), kwWidth);
            }

            if (item.reminder) {
              ctx.font = `italic 700 ${reminderFontSize}px "EB Garamond", Garamond, Georgia, serif`;
              block.reminderLines = wrapText(ctx, item.reminder.toUpperCase(), kwWidth - 8);
            }

            let blockHeight = 0;
            if (block.keywordLines.length) {
              blockHeight += block.keywordLines.length * (keywordFontSize + 5);
            }
            if (block.reminderLines.length) {
              if (block.keywordLines.length) blockHeight += 4;
              blockHeight += block.reminderLines.length * (reminderFontSize + 4);
            }
            blockHeight += 11;

            block.height = blockHeight;
            totalHeight += blockHeight;
            blocks.push(block);
          });

          return { blocks, totalHeight };
        }

        let layout = buildKeywordLayout();
        const maxKeywordHeight = innerH - 365;

        while (layout.totalHeight > maxKeywordHeight && keywordFontSize > 17) {
          keywordFontSize -= 2;
          reminderFontSize = Math.max(12, reminderFontSize - 1);
          layout = buildKeywordLayout();
        }

        let currentY = kwTop;

        layout.blocks.forEach(block => {
          if (block.keywordLines.length) {
            ctx.fillStyle = "#202020";
            ctx.font = `normal 700 ${keywordFontSize}px "EB Garamond", Garamond, Georgia, serif`;
            block.keywordLines.forEach(line => {
              ctx.fillText(line, kwLeft, currentY);
              currentY += keywordFontSize + 5;
            });
          }

          if (block.reminderLines.length) {
            if (block.keywordLines.length) currentY += 4;
            ctx.fillStyle = "#444";
            ctx.font = `italic 700 ${reminderFontSize}px "EB Garamond", Garamond, Georgia, serif`;
            block.reminderLines.forEach(line => {
              ctx.fillText(line, kwLeft + 6, currentY);
              currentY += reminderFontSize + 4;
            });
          }

          currentY += 11;
        });
      }

      function downloadCanvas() {
        const link = document.createElement("a");
        const safeName = (els.unitName.value || "unit-card")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");

        link.download = `${safeName || "unit-card"}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      function printCanvas() {
        const printArea = document.getElementById("carcosa-print-only");
        const img = new Image();
        img.src = canvas.toDataURL("image/png");
        img.style.width = "3.5in";
        img.style.height = "2.5in";
        img.style.display = "block";

        printArea.innerHTML = "";
        printArea.style.display = "block";
        printArea.appendChild(img);

        setTimeout(() => {
          window.print();
          setTimeout(() => {
            printArea.style.display = "none";
          }, 500);
        }, 150);
      }

      function populateStats(values) {
        els.statList.innerHTML = "";
        statDefinitions.forEach(def => {
          const item = makeStatItem(def, values[def.key] || "");
          els.statList.appendChild(item);
        });
      }

      function loadExample() {
        els.unitName.value = "The Mob of Carcosa";
        els.unitType.value = "Light Infantry";

        populateStats({
          speed: "8",
          range: "",
          strikes: "10",
          courage: "10",
          points: "275",
          altPoints: ""
        });

        els.keywordsBox.innerHTML = "";
        const block = makeKeywordBlock("Unruly", "Does not benefit from Command");
        els.keywordsBox.appendChild(block);
        bindKeywordEvents(block);

        renderCard();
      }

      els.unitName.addEventListener("input", renderCard);
      els.unitType.addEventListener("input", renderCard);
      els.unitType.addEventListener("change", renderCard);

      els.downloadPngBtn.addEventListener("click", downloadCanvas);
      els.printBtn.addEventListener("click", printCanvas);
      els.resetBtn.addEventListener("click", loadExample);

      loadExample();
    })();
  </script>
</div>
</body>
</html>
