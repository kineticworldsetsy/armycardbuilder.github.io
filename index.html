<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Army Unit Card Builder</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@700&display=swap');

@font-face {
  font-family: 'Frakturika';
  src: url('./FRAKTURI.ttf') format('truetype');
  font-display: swap;
}

body {
  background-color:#f3f2ec; /* parchment */
  margin:0;
}

#army-card-suite {
  --page-bg: #f3f2ec;
  --fantasy-panel: #f7f6ef;

  --sf-purple: #583F8C;
  --sf-mint: #9ADAC5;

  font-family: Arial, sans-serif;
  padding:20px;
}

.mode-tabs button {
  margin-right:10px;
  padding:10px;
  cursor:pointer;
}

.unit-tabs button {
  margin:4px;
  padding:6px 10px;
}

.builder-wrap {
  display:grid;
  grid-template-columns: 420px 1fr;
  gap:20px;
}

.panel {
  background:white;
  padding:15px;
  border-radius:10px;
}

.canvas-shell {
  background:linear-gradient(#b8eadb,#9adac5);
  padding:10px;
}

canvas {
  width:100%;
  max-width:800px;
}
</style>

</head>

<body>

<div id="army-card-suite">

<!-- MODE -->

<div class="mode-tabs">
  <button onclick="showPage('fantasy')">Fantasy</button>
  <button onclick="showPage('scifi')">Sci-Fi</button>
</div>

<!-- ================= FANTASY ================= -->

<div id="fantasyPage">

<h3>Fantasy Units</h3>
<div id="fantasyTabs"></div>

<button onclick="addFantasy()">+ Add Unit</button> <button onclick="copyFantasy()">Copy Unit</button> <button onclick="deleteFantasy()">Delete</button>

<div class="builder-wrap">

<div class="panel">

<input id="f_name" placeholder="Unit Name">
<select id="f_type">
<option>Light Infantry</option>
<option>Ranged Infantry</option>
</select>

<input id="f_points" type="number" placeholder="Points">
<input id="f_alt" type="number" placeholder="(Points)">

</div>

<div class="panel canvas-shell">
<canvas id="f_canvas" width="1050" height="750"></canvas>
</div>

</div>
</div>

<!-- ================= SCIFI ================= -->

<div id="scifiPage" style="display:none">

<h3>Sci-Fi Units</h3>
<div id="sfTabs"></div>

<button onclick="addSF()">+ Add Unit</button> <button onclick="copySF()">Copy Unit</button> <button onclick="deleteSF()">Delete</button>

<div class="builder-wrap">

<div class="panel">

<input id="sf_name">
<select id="sf_type">
<option>Light Infantry</option>
<option>Heavy Infantry</option>
</select>

<input id="sf_cost" type="number">
<input id="sf_alt" type="number">

</div>

<div class="panel canvas-shell">
<canvas id="sf_canvas" width="1050" height="750"></canvas>
</div>

</div>
</div>

</div>

<script>

// =========================
// PAGE SWITCH
// =========================
function showPage(p){
  fantasyPage.style.display = p==="fantasy"?"block":"none";
  scifiPage.style.display = p==="scifi"?"block":"none";
}

// =========================
// STATE
// =========================
let fantasy = [{name:"The Mob of Carcosa",points:275,alt:""}];
let fIndex = 0;

let scifi = [{name:"DUST RUNNERS",cost:50,alt:40}];
let sfIndex = 0;

// =========================
// COPY FEATURE
// =========================
function copyFantasy(){
  let c = JSON.parse(JSON.stringify(fantasy[fIndex]));
  c.name += " Copy";
  fantasy.push(c);
  fIndex = fantasy.length-1;
  renderFantasyTabs();
}

function copySF(){
  let c = JSON.parse(JSON.stringify(scifi[sfIndex]));
  c.name += " Copy";
  scifi.push(c);
  sfIndex = scifi.length-1;
  renderSFTabs();
}

// =========================
// ADD / DELETE
// =========================
function addFantasy(){
  fantasy.push({name:"New Unit",points:0});
  fIndex=fantasy.length-1;
  renderFantasyTabs();
}

function deleteFantasy(){
  if(fantasy.length<=1)return;
  fantasy.splice(fIndex,1);
  fIndex=0;
  renderFantasyTabs();
}

function addSF(){
  scifi.push({name:"New Unit",cost:0});
  sfIndex=scifi.length-1;
  renderSFTabs();
}

function deleteSF(){
  if(scifi.length<=1)return;
  scifi.splice(sfIndex,1);
  sfIndex=0;
  renderSFTabs();
}

// =========================
// TABS
// =========================
function renderFantasyTabs(){
  fantasyTabs.innerHTML="";
  fantasy.forEach((u,i)=>{
    let b=document.createElement("button");
    b.innerText=u.name;
    b.onclick=()=>{fIndex=i;renderFantasyTabs();}
    fantasyTabs.appendChild(b);
  });
  drawFantasy();
}

function renderSFTabs(){
  sfTabs.innerHTML="";
  scifi.forEach((u,i)=>{
    let b=document.createElement("button");
    b.innerText=u.name;
    b.onclick=()=>{sfIndex=i;renderSFTabs();}
    sfTabs.appendChild(b);
  });
  drawSF();
}

// =========================
// DRAW FANTASY
// =========================
function drawFantasy(){
  let ctx=f_canvas.getContext("2d");
  ctx.clearRect(0,0,1050,750);

  ctx.fillStyle="#fcfcf9";
  ctx.fillRect(0,0,1050,750);

  let u=fantasy[fIndex];

  ctx.font="60px Frakturika";
  ctx.textAlign="center";
  ctx.fillStyle="#222";
  ctx.fillText(u.name,525,80);
}

// =========================
// DRAW SCIFI
// =========================
function drawSF(){
  let ctx=sf_canvas.getContext("2d");
  ctx.clearRect(0,0,1050,750);

  ctx.fillStyle="#F7FFFB";
  ctx.fillRect(0,0,1050,750);

  let u=scifi[sfIndex];

  ctx.font="60px Frakturika";
  ctx.fillStyle="#583F8C";
  ctx.textAlign="center";

  // TITLE WITH EXTRA MARGIN
  ctx.fillText(u.name,525,90);

  ctx.font="50px EB Garamond";
  ctx.fillStyle="#2F2350";
  ctx.fillText(u.cost+"PTS",525,200);

  // ALT COST FIX
  ctx.font="italic 36px EB Garamond";
  ctx.fillStyle="#6b5a9a";
  ctx.fillText("("+u.alt+"PTS)",525,245);
}

// =========================
renderFantasyTabs();
renderSFTabs();

</script>

</body>
</html>
