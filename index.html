<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Army Unit Card Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color:#ECECEC;">
    
    <div id="army-card-suite">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@700&display=swap');

    @font-face {
      font-family: 'Frakturika';
      src: url('/wp-content/uploads/fonts/Frakturika.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    #army-card-suite {
      --page-bg: #ececec;
      --fantasy-panel: #f7f7f4;
      --fantasy-border: #d9d9d1;
      --fantasy-accent: #dce97a;
      --fantasy-dark: #222;
      --fantasy-soft: #ecece7;

      --sf-purple: #583F8C;
      --sf-mint: #9ADAC5;
      --sf-mint-light: #eaf8f3;
      --sf-panel: #f8fffc;
      --sf-ink: #2d2350;
      --sf-soft: #ece8f7;

      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      background: var(--page-bg);
      padding: 18px;
      border-radius: 16px;
      max-width: 1380px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    #army-card-suite *,
    #army-card-suite *::before,
    #army-card-suite *::after {
      box-sizing: border-box;
    }

    #army-card-suite .mode-tabs,
    #army-card-suite .unit-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    #army-card-suite .mode-tab,
    #army-card-suite .unit-tab,
    #army-card-suite .small-btn,
    #army-card-suite .action-btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    #army-card-suite .mode-tab {
      padding: 12px 16px;
      background: #ddd;
      color: #222;
    }

    #army-card-suite .mode-tab.active {
      background: #222;
      color: #fff;
    }

    #army-card-suite .suite-page {
      display: none;
    }

    #army-card-suite .suite-page.active {
      display: block;
    }

    #army-card-suite .builder-wrap {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 24px;
      align-items: start;
    }

    #army-card-suite .panel {
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,.06);
    }

    #army-card-suite .fantasy-page .panel {
      background: var(--fantasy-panel);
      border: 1px solid var(--fantasy-border);
    }

    #army-card-suite .scifi-page .panel {

      border: 2px solid rgba(88, 63, 140, 0.25);
    }

    #army-card-suite .preview-note {

    }

      border: 1px solid #d4d4cc;

      }

  <script>
    (function () {
      /* ---------- shared helpers ---------- */
      function fitText(ctx, text, maxWidth, startSize, minSize, fontFamily, fontWeight = "700", fontStyle = "normal") {
        let size = startSize;
        while (size > minSize) {
          ctx.font = `${fontStyle} ${fontWeight} ${size}px ${fontFamily}`;
          if (ctx.measureText(text).width <= maxWidth) return size;
          size -= 1;
        }
        return minSize;
      }

      function wrapText(ctx, text, maxWidth) {
        const paragraphs = String(text).split("\n");
        const allLines = [];

        paragraphs.forEach(paragraph => {
          const words = paragraph.split(/\s+/).filter(Boolean);
          if (!words.length) {
            allLines.push("");
            return;
          }
          let line = "";
          for (let i = 0; i < words.length; i++) {
            const testLine = line ? line + " " + words[i] : words[i];
            const testWidth = ctx.measureText(testLine).width;
            if (testWidth > maxWidth && line) {
              allLines.push(line);
              line = words[i];
            } else {
              line = testLine;
            }
          }
          if (line) allLines.push(line);
        });

        return allLines;
      }

      function roughRect(ctx, x, y, w, h, jitter, step) {
        ctx.beginPath();
        roughLine(ctx, x, y, x + w, y, jitter, step);
        roughLine(ctx, x + w, y, x + w, y + h, jitter, step);
        roughLine(ctx, x + w, y + h, x, y + h, jitter, step);
        roughLine(ctx, x, y + h, x, y, jitter, step);
        ctx.stroke();
      }

      function roughLine(ctx, x1, y1, x2, y2, jitter, step) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const segments = Math.max(2, Math.floor(dist / step));
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const x = x1 + dx * t + (Math.random() - 0.5) * jitter;
          const y = y1 + dy * t + (Math.random() - 0.5) * jitter;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
      }

      function drawBlob(ctx, x, y, w, h) {
        ctx.beginPath();
        const pts = 10;
        for (let i = 0; i < pts; i++) {
          const px = x + (i / (pts - 1)) * w;
          const py = y + (Math.random() * h);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        for (let i = pts - 1; i >= 0; i--) {
          const px = x + (i / (pts - 1)) * w;
          const py = y + h + (Math.random() * h * 0.25);
          ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
      }

      function downloadCanvas(canvas, filenameBase) {
        const link = document.createElement("a");
        const safeName = (filenameBase || "unit-card")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
        link.download = `${safeName || "unit-card"}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      /* ---------- suite page tabs ---------- */
      document.querySelectorAll("#army-card-suite .mode-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#army-card-suite .mode-tab").forEach(b => b.classList.remove("active"));
          document.querySelectorAll("#army-card-suite .suite-page").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(btn.dataset.page).classList.add("active");
        });
      });

      /* ---------- fantasy builder ---------- */
      const fantasyCanvas = document.getElementById("fantasyCardCanvas");
      const fctx = fantasyCanvas.getContext("2d");

      const fantasyEls = {
        unitTabs: document.getElementById("fantasyUnitTabs"),
        addUnitBtn: document.getElementById("fantasyAddUnitBtn"),
        deleteUnitBtn: document.getElementById("fantasyDeleteUnitBtn"),
        unitName: document.getElementById("fantasyUnitName"),
        unitType: document.getElementById("fantasyUnitType"),
        statList: document.getElementById("fantasyStatList"),
        keywordsBox: document.getElementById("fantasyKeywordsBox"),
        downloadBtn: document.getElementById("fantasyDownloadPngBtn"),
        printAllBtn: document.getElementById("fantasyPrintAllBtn"),
        resetUnitBtn: document.getElementById("fantasyResetUnitBtn")
      };

      const fantasyStatDefinitions = [
        { key: "speed", label: "Speed", note: "Shown on card and affected by order" },
        { key: "range", label: "Range", note: "Shown on card and affected by order" },
        { key: "strikes", label: "Strikes", note: "Shown on card and affected by order" },
        { key: "courage", label: "Courage", note: "Shown on card and affected by order" },
        { key: "points", label: "Points", note: "Shown on card and affected by order" },
        { key: "altPoints", label: "(Points)", note: "Can be rearranged here, but always appears under Points" }
      ];

      function createDefaultFantasyUnit(name = "New Unit") {
        return {
          id: "u_" + Math.random().toString(36).slice(2, 9),
          unitName: name,
          unitType: "Light Infantry",
          statOrder: ["speed", "range", "strikes", "courage", "points", "altPoints"],
          stats: {
            speed: "8",
            range: "",
            strikes: "10",
            courage: "10",
            points: "275",
            altPoints: ""
          },
          keywords: [
            { keyword: "Unruly", reminder: "Does not benefit from Command" }
          ]
        };
      }

      const fantasyState = {
        units: [createDefaultFantasyUnit("The Mob of Carcosa")],
        activeUnitId: null
      };
      fantasyState.activeUnitId = fantasyState.units[0].id;

      function getActiveFantasyUnit() {
        return fantasyState.units.find(u => u.id === fantasyState.activeUnitId);
      }

      function renderFantasyUnitTabs() {
        fantasyEls.unitTabs.innerHTML = "";
        fantasyState.units.forEach(unit => {
          const btn = document.createElement("button");
          btn.className = "unit-tab" + (unit.id === fantasyState.activeUnitId ? " active" : "");
          btn.textContent = unit.unitName || "Untitled Unit";
          btn.addEventListener("click", () => {
            saveFantasyFormIntoActiveUnit();
            fantasyState.activeUnitId = unit.id;
            loadFantasyUnitIntoForm();
          });
          fantasyEls.unitTabs.appendChild(btn);
        });
      }

      function makeFantasyStatItem(def, value = "") {

      function drawFantasyBorder(ctx, x, y, w, h) {
        ctx.save();
        ctx.strokeStyle = "#1c1c1c";
        ctx.fillStyle = "#1c1c1c";
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.lineWidth = 8;
        roughRect(ctx, x + 16, y + 16, w - 32, h - 32, 7, 6);

        ctx.globalAlpha = 0.6;
        ctx.lineWidth = 3;
        roughRect(ctx, x + 24, y + 24, w - 48, h - 48, 10, 4);

        ctx.globalAlpha = 0.95;
        const blotches = [
          [x + 18, y + 20, 34, 16],
          [x + 80, y + 18, 30, 12],
          [x + w - 75, y + 22, 28, 14],
          [x + w - 38, y + 26, 18, 9],
          [x + 22, y + h - 42, 42, 16],
          [x + 66, y + h - 28, 22, 10],
          [x + w - 100, y + h - 35, 46, 18],
          [x + w - 44, y + h - 24, 20, 10],
          [x + 14, y + 120, 12, 36],
          [x + 20, y + 250, 10, 34],
          [x + w - 26, y + 140, 10, 42],
          [x + w - 28, y + 310, 11, 28]
        ];
        blotches.forEach(([bx, by, bw, bh]) => drawBlob(ctx, bx, by, bw, bh));
        ctx.restore();
      }

      function renderFantasyCardToCanvas(unit, canvas) {
        const ctx = canvas.getContext("2d");
        const statData = unit.statOrder.map(key => ({
          key,
          label: fantasyStatDefinitions.find(d => d.key === key).label,
          value: unit.stats[key] || ""
        }));
        const mainStatOrder = statData.filter(s => s.key !== "altPoints");
        const altPointsEntry = statData.find(s => s.key === "altPoints");

        const data = {
          unitName: unit.unitName || "Untitled Unit",
          unitType: unit.unitType || "",
          stats: mainStatOrder,
          altPoints: altPointsEntry ? altPointsEntry.value : "",
          keywords: unit.keywords || []
        };

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fcfcf9";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 900; i++) {
          const alpha = Math.random() * 0.03;
          ctx.fillStyle = `rgba(0,0,0,${alpha})`;
          const px = Math.random() * canvas.width;
          const py = Math.random() * canvas.height;
          const s = Math.random() * 2 + 0.5;
          ctx.fillRect(px, py, s, s);
        }

        drawFantasyBorder(ctx, 0, 0, canvas.width, canvas.height);

        const innerX = 55;
        const innerY = 42;
        const innerW = canvas.width - 110;
        const innerH = canvas.height - 84;

        const titleMaxWidth = innerW - 30;
        let titleStart = 76;
        if (data.unitName.length > 18) titleStart = 68;
        if (data.unitName.length > 26) titleStart = 60;
        if (data.unitName.length > 34) titleStart = 52;
        if (data.unitName.length > 42) titleStart = 46;

        const titleSize = fitText(
          ctx,
          data.unitName,
          titleMaxWidth,
          titleStart,
          28,
          '"Frakturika", "Palatino Linotype", "Book Antiqua", Georgia, serif',
          "normal",
          "normal"
        );

        ctx.fillStyle = "#232323";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.font = `normal ${titleSize}px "Frakturika", "Palatino Linotype", "Book Antiqua", Georgia, serif`;
        ctx.fillText(data.unitName, canvas.width / 2, innerY + 4);

        ctx.font = `normal 700 34px "EB Garamond", Garamond, Georgia, serif`;
        ctx.fillStyle = "#4a4a4a";
        ctx.fillText(data.unitType.toUpperCase(), canvas.width / 2, innerY + 96);

        const statsTop = innerY + 154;
        const labelY = statsTop;
        const valueY = statsTop + 40;
        const altValueY = valueY + 82;

        const colXs = [
          innerX + 70,
          innerX + 250,
          innerX + 450,
          innerX + 655,
          innerX + 835
        ];

        ctx.textAlign = "center";
        ctx.textBaseline = "top";

        data.stats.forEach((stat, i) => {
          const x = colXs[i];
          const labelText = stat.label.toUpperCase();

          ctx.fillStyle = "#2f2f2f";
          ctx.font = `normal 700 30px "EB Garamond", Garamond, Georgia, serif`;
          ctx.fillText(labelText, x, labelY);

          let displayValue = stat.value;
          if (stat.key === "range" && displayValue === "") displayValue = "—";
          if (displayValue === "") displayValue = "—";

          const valueSize = fitText(
            ctx,
            String(displayValue),
            150,
            stat.key === "points" ? 78 : 84,
            44,
            '"EB Garamond", Garamond, Georgia, serif',
            "700",
            "normal"
          );

          ctx.fillStyle = "#111";
          ctx.font = `normal 700 ${valueSize}px "EB Garamond", Garamond, Georgia, serif`;
          ctx.fillText(String(displayValue).toUpperCase(), x, valueY);

          if (stat.key === "points" && data.altPoints) {
            const altText = `(${String(data.altPoints).toUpperCase()})`;
            const altSize = fitText(
              ctx,
              altText,
              145,
              50,
              26,
              '"EB Garamond", Garamond, Georgia, serif',
              "700",
              "normal"
            );
            ctx.fillStyle = "#444";
            ctx.font = `normal 700 ${altSize}px "EB Garamond", Garamond, Georgia, serif`;
            ctx.fillText(altText, x, altValueY);
          }
        });

        const kwTop = innerY + 330;
        const kwLeft = innerX + 42;
        const kwWidth = innerW - 84;

        let keywordFontSize = 36;
        let reminderFontSize = 22;

        const totalKeywordChars = data.keywords.reduce((sum, item) => sum + item.keyword.length + item.reminder.length, 0);

        if (data.keywords.length >= 3) {
          keywordFontSize = 31;
          reminderFontSize = 19;
        }
        if (data.keywords.length >= 5 || totalKeywordChars > 110) {
          keywordFontSize = 27;
          reminderFontSize = 17;
        }
        if (data.keywords.length >= 7 || totalKeywordChars > 180) {
          keywordFontSize = 23;
          reminderFontSize = 15;
        }

        function buildKeywordLayout() {
          const blocks = [];
          let totalHeight = 0;

          data.keywords.forEach(item => {
            const block = { keywordLines: [], reminderLines: [] };

            if (item.keyword) {
              ctx.font = `normal 700 ${keywordFontSize}px "EB Garamond", Garamond, Georgia, serif`;
              block.keywordLines = wrapText(ctx, item.keyword.toUpperCase(), kwWidth);
            }

            if (item.reminder) {
              ctx.font = `italic 700 ${reminderFontSize}px "EB Garamond", Garamond, Georgia, serif`;
              block.reminderLines = wrapText(ctx, item.reminder.toUpperCase(), kwWidth - 8);
            }

            let blockHeight = 0;
            if (block.keywordLines.length) blockHeight += block.keywordLines.length * (keywordFontSize + 5);
            if (block.reminderLines.length) {
              if (block.keywordLines.length) blockHeight += 4;
              blockHeight += block.reminderLines.length * (reminderFontSize + 4);
            }
            blockHeight += 11;
            totalHeight += blockHeight;
            blocks.push(block);
          });

          return { blocks, totalHeight };
        }

        let layout = buildKeywordLayout();
        const maxKeywordHeight = innerH - 365;

        while (layout.totalHeight > maxKeywordHeight && keywordFontSize > 17) {
          keywordFontSize -= 2;
          reminderFontSize = Math.max(12, reminderFontSize - 1);
          layout = buildKeywordLayout();
        }

        let currentY = kwTop;
        layout.blocks.forEach(block => {
          if (block.keywordLines.length) {
            ctx.fillStyle = "#202020";
            ctx.font = `normal 700 ${keywordFontSize}px "EB Garamond", Garamond, Georgia, serif`;
            block.keywordLines.forEach(line => {
              ctx.fillText(line, kwLeft, currentY);
              currentY += keywordFontSize + 5;
            });
          }

          if (block.reminderLines.length) {
            if (block.keywordLines.length) currentY += 4;
            ctx.fillStyle = "#444";
            ctx.font = `italic 700 ${reminderFontSize}px "EB Garamond", Garamond, Georgia, serif`;
            block.reminderLines.forEach(line => {
              ctx.fillText(line, kwLeft + 6, currentY);
              currentY += reminderFontSize + 4;
            });
          }

          currentY += 11;
        });
      }

      function bindDragReorder(container, item, onEnd) {
        item.addEventListener("dragstart", () => {
          container._draggedItem = item;
          item.classList.add("dragging");
        });

        item.addEventListener("dragend", () => {
          item.classList.remove("dragging");
          container._draggedItem = null;
          Array.from(container.children).forEach(child => child.classList.remove("drag-over"));
          onEnd();
        });

        item.addEventListener("dragover", e => e.preventDefault());

        item.addEventListener("dragenter", e => {
          e.preventDefault();
          if (item !== container._draggedItem) item.classList.add("drag-over");
        });

        item.addEventListener("dragleave", () => item.classList.remove("drag-over"));

        item.addEventListener("drop", e => {
          e.preventDefault();
          item.classList.remove("drag-over");
          const draggedItem = container._draggedItem;
          if (!draggedItem || draggedItem === item) return;

          const items = Array.from(container.children);
          const draggedIndex = items.indexOf(draggedItem);
          const targetIndex = items.indexOf(item);

          if (draggedIndex < targetIndex) container.insertBefore(draggedItem, item.nextSibling);
          else container.insertBefore(draggedItem, item);
        });
      }

        ctx.globalAlpha = 0.45;
        ctx.lineWidth = 3;
        roughRect(ctx, x + 28, y + 28, w - 56, h - 56, 7, 8);

        ctx.globalAlpha = 0.9;
        drawBlob(ctx, x + 18, y + 20, 50, 12);
        drawBlob(ctx, x + w - 85, y + 20, 52, 12);
        drawBlob(ctx, x + 20, y + h - 38, 58, 13);
        drawBlob(ctx, x + w - 95, y + h - 38, 62, 13);

        ctx.globalAlpha = 0.18;
        ctx.fillRect(x + 46, y + 46, w - 92, 6);
        ctx.fillRect(x + 46, y + h - 52, w - 92, 6);
        ctx.restore();
      }

      function renderSciFiCardToCanvas(canvas) {
        const ctx = canvas.getContext("2d");
        saveSciFiForm();

        const statData = sfState.statOrder.map(key => ({
          key,
          label: sfStatDefinitions.find(d => d.key === key).label,
          value: sfState.stats[key] || ""
        }));
        const mainStats = statData.filter(s => s.key !== "altCost");
        const altCostEntry = statData.find(s => s.key === "altCost");

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#F7FFFB";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 950; i++) {
          const alpha = Math.random() * 0.03;
          ctx.fillStyle = `rgba(88,63,140,${alpha})`;
          const px = Math.random() * canvas.width;
          const py = Math.random() * canvas.height;
          const s = Math.random() * 2 + 0.5;
          ctx.fillRect(px, py, s, s);
        }

        ctx.fillStyle = "rgba(154,218,197,0.22)";
        ctx.fillRect(38, 44, canvas.width - 76, canvas.height - 88);

        drawSciFiBorder(ctx, 0, 0, canvas.width, canvas.height);

        const innerX = 55;
        const innerY = 42;
        const innerW = canvas.width - 110;
        const innerH = canvas.height - 84;

        const titleMaxWidth = innerW - 40;
        let titleStart = 76;
        if (sfState.unitName.length > 18) titleStart = 68;
        if (sfState.unitName.length > 26) titleStart = 60;
        if (sfState.unitName.length > 34) titleStart = 52;
        if (sfState.unitName.length > 42) titleStart = 46;

        const titleSize = fitText(
          ctx,
          sfState.unitName,
          titleMaxWidth,
          titleStart,
          28,
          '"Frakturika", "Palatino Linotype", "Book Antiqua", Georgia, serif',
          "normal",
          "normal"
        );

        ctx.fillStyle = "#583F8C";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.font = `normal ${titleSize}px "Frakturika", "Palatino Linotype", "Book Antiqua", Georgia, serif`;
        ctx.fillText(sfState.unitName, canvas.width / 2, innerY + 2);

        ctx.fillStyle = "#583F8C";
        ctx.font = `normal 700 32px "EB Garamond", Garamond, Georgia, serif`;
        ctx.fillText(sfState.unitType.toUpperCase(), canvas.width / 2, innerY + 92);

        ctx.font = `normal 700 24px "EB Garamond", Garamond, Georgia, serif`;
        ctx.fillText(`UNIT COUNT ${sfState.unitCount}`, canvas.width / 2, innerY + 128);

        const statsTop = innerY + 182;
        const labelY = statsTop;
        const valueY = statsTop + 36;
        const altValueY = valueY + 76;

        const colXs = [
          innerX + 55,
          innerX + 210,
          innerX + 365,
          innerX + 545,
          innerX + 720,
          innerX + 875
        ];

        ctx.textAlign = "center";
        ctx.textBaseline = "top";

        mainStats.forEach((stat, i) => {
          const x = colXs[i];
          const displayValue = formatSciFiStatValue(stat.key, stat.value);

          ctx.fillStyle = "#583F8C";
          ctx.font = `normal 700 26px "EB Garamond", Garamond, Georgia, serif`;
          ctx.fillText(stat.label.toUpperCase(), x, labelY);

          const valueSize = fitText(
            ctx,
            displayValue,
            145,
            stat.key === "cost" ? 58 : 66,
            26,
            '"EB Garamond", Garamond, Georgia, serif',
            "700",
            "normal"
          );

          ctx.fillStyle = "#2F2350";
          ctx.font = `normal 700 ${valueSize}px "EB Garamond", Garamond, Georgia, serif`;
          ctx.fillText(displayValue, x, valueY);

          if (stat.key === "cost" && altCostEntry && altCostEntry.value) {
            const altText = `(${altCostEntry.value}PTS)`;
            const altSize = fitText(
              ctx,
              altText,
              140,
              36,
              20,
              '"EB Garamond", Garamond, Georgia, serif',
              "700",
              "normal"
            );
            ctx.fillStyle = "#583F8C";
            ctx.font = `normal 700 ${altSize}px "EB Garamond", Garamond, Georgia, serif`;
            ctx.fillText(altText, x, altValueY);
          }
        });

        const kwTop = innerY + 318;
        const kwLeft = innerX + 40;
        const kwWidth = innerW - 80;

        let keywordFontSize = 34;
        let reminderFontSize = 21;

        const totalKeywordChars = sfState.keywords.reduce((sum, item) => sum + item.keyword.length + item.reminder.length, 0);

        if (sfState.keywords.length >= 3) {
          keywordFontSize = 30;
          reminderFontSize = 18;
        }
        if (sfState.keywords.length >= 5 || totalKeywordChars > 110) {
          keywordFontSize = 26;
          reminderFontSize = 16;
        }
        if (sfState.keywords.length >= 7 || totalKeywordChars > 180) {
          keywordFontSize = 22;
          reminderFontSize = 14;
        }

        function buildKeywordLayout() {
          const blocks = [];
          let totalHeight = 0;

          sfState.keywords.forEach(item => {
            const block = { keywordLines: [], reminderLines: [] };

            if (item.keyword) {
              ctx.font = `normal 700 ${keywordFontSize}px "EB Garamond", Garamond, Georgia, serif`;
              block.keywordLines = wrapText(ctx, item.keyword.toUpperCase(), kwWidth);
            }

            if (item.reminder) {
              ctx.font = `italic 700 ${reminderFontSize}px "EB Garamond", Garamond, Georgia, serif`;
              block.reminderLines = wrapText(ctx, item.reminder.toUpperCase(), kwWidth - 8);
            }

            let blockHeight = 0;
            if (block.keywordLines.length) blockHeight += block.keywordLines.length * (keywordFontSize + 5);
            if (block.reminderLines.length) {
              if (block.keywordLines.length) blockHeight += 4;
              blockHeight += block.reminderLines.length * (reminderFontSize + 4);
            }
            blockHeight += 11;
            totalHeight += blockHeight;
            blocks.push(block);
          });

          return { blocks, totalHeight };
        }

        let layout = buildKeywordLayout();
        const maxKeywordHeight = innerH - 350;

        while (layout.totalHeight > maxKeywordHeight && keywordFontSize > 16) {
          keywordFontSize -= 2;
          reminderFontSize = Math.max(12, reminderFontSize - 1);
          layout = buildKeywordLayout();
        }

        let currentY = kwTop;
        layout.blocks.forEach(block => {
          if (block.keywordLines.length) {
            ctx.fillStyle = "#583F8C";
            ctx.font = `normal 700 ${keywordFontSize}px "EB Garamond", Garamond, Georgia, serif`;
            block.keywordLines.forEach(line => {
              ctx.fillText(line, kwLeft, currentY);
              currentY += keywordFontSize + 5;
            });
          }
          if (block.reminderLines.length) {
            if (block.keywordLines.length) currentY += 4;
            ctx.fillStyle = "#3D3066";
            ctx.font = `italic 700 ${reminderFontSize}px "EB Garamond", Garamond, Georgia, serif`;
            block.reminderLines.forEach(line => {
              ctx.fillText(line, kwLeft + 6, currentY);
              currentY += reminderFontSize + 4;
            });
          }
          currentY += 11;
        });
      }

      function renderSciFiPreview() {
        renderSciFiCardToCanvas(sfCanvas);
      }

      function loadSciFiForm() {
        sfEls.unitName.value = sfState.unitName;
        sfEls.unitType.value = sfState.unitType;
        sfEls.unitCount.value = sfState.unitCount;

        sfEls.statList.innerHTML = "";
        sfState.statOrder.forEach(key => {
          const def = sfStatDefinitions.find(d => d.key === key);
          sfEls.statList.appendChild(makeSciFiStatItem(def, sfState.stats[key] || ""));
        });

        sfEls.keywordsBox.innerHTML = "";
        const kws = sfState.keywords.length ? sfState.keywords : [{ keyword: "", reminder: "" }];
        kws.forEach(k => {
          const block = makeSciFiKeywordBlock(k.keyword, k.reminder);
          sfEls.keywordsBox.appendChild(block);
          bindSciFiKeywordEvents(block);
        });

        renderSciFiPreview();
      }

      sfEls.unitName.addEventListener("input", renderSciFiPreview);
      sfEls.unitType.addEventListener("change", renderSciFiPreview);
      sfEls.unitCount.addEventListener("input", renderSciFiPreview);

      sfEls.countDown.addEventListener("click", () => {
        clampSciFiCount();
        sfEls.unitCount.value = Math.max(1, parseInt(sfEls.unitCount.value, 10) - 1);
        renderSciFiPreview();
      });

      sfEls.countUp.addEventListener("click", () => {
        clampSciFiCount();
        sfEls.unitCount.value = Math.min(99, parseInt(sfEls.unitCount.value, 10) + 1);
        renderSciFiPreview();
      });

      sfEls.downloadBtn.addEventListener("click", () => {
        renderSciFiPreview();
        downloadCanvas(sfCanvas, sfEls.unitName.value || "scifi-unit-card");
      });

      sfEls.printBtn.addEventListener("click", () => {
        renderSciFiPreview();
        const win = window.open("", "_blank");
        const img = sfCanvas.toDataURL("image/png");
        win.document.write(`
          <html>
            <head><title>Print Card</title></head>
            <body style="margin:0;padding:0;">
              <img src="${img}" style="width:3.5in;height:2.5in;display:block;" />
              <script>
                window.onload = function(){ window.print(); }
              <\/script>
            </body>
          </html>
        `);
        win.document.close();
      });

      sfEls.resetBtn.addEventListener("click", () => {
        sfState.unitName = "DUST RUNNERS";
        sfState.unitType = "Light Infantry";
        sfState.unitCount = "1";
        sfState.statOrder = ["cost", "altCost", "range", "move", "combat", "defense", "morale"];
        sfState.stats = {
          cost: "50",
          altCost: "40",
          range: "24",
          move: "6",
          combat: "4",
          defense: "5",
          morale: "7"
        };
        sfState.keywords = [
          { keyword: "SCOUT", reminder: "MAY REDEPLOY AFTER DEPLOYMENT." },
          { keyword: "SCRAP ARMOR", reminder: "IGNORE THE FIRST FAILED DEFENSE EACH ROUND." }
        ];
        loadSciFiForm();
      });

      loadSciFiForm();
    })();
  </script>
</div>
</body>
</html>
